services:
  app:
    build: .
    ports:
      - "8000:80"
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_KEY: base64:KtnLh2qEA0vaFCmgAC3hFw8EhFTuNOrE7xn8NjPPWkw=
      APP_DEBUG: true
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: dev201
      DB_USERNAME: root
      DB_PASSWORD: Habib2006
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      CACHE_STORE: database
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: dev201
      MYSQL_ROOT_PASSWORD: Habib2006
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pHabib2006"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data: